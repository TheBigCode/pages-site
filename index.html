<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheBigCode - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            animation: fadeIn 1.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            margin-bottom: 1.5rem;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.4);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            margin: 1rem 0;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .info-item {
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .info-item strong {
            color: #00d4ff;
            display: block;
            margin-bottom: 0.3rem;
        }
        .links {
            margin-top: 2rem;
        }
        .links a {
            display: inline-block;
            margin: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .links a:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            transform: scale(1.05);
        }
        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: var(--opacity); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <img src="https://avatars.githubusercontent.com/u/9150198?v=4" alt="Avatar" class="avatar">
        <h1>TheBigCode</h1>
        <p class="subtitle">Sevenzhou Zhou | 开发者 | 代码爱好者</p>
        <span class="badge">🚀 GitHub Pages 部署成功</span>

        <div class="card">
            <h2>关于我</h2>
            <p>热爱编程与技术探索，专注于构建优雅的代码与用户体验。这个页面是通过自动化工具一键部署到 GitHub Pages 的！</p>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <strong>公司</strong>
                cynet
            </div>
            <div class="info-item">
                <strong>GitHub 注册</strong>
                2014年10月
            </div>
            <div class="info-item">
                <strong>公开仓库</strong>
                9个
            </div>
            <div class="info-item">
                <strong>部署时间</strong>
                2026-07-03
            </div>
        </div>

        <div class="links">
            <a href="https://github.com/TheBigCode" target="_blank">GitHub 主页</a>
            <a href="https://github.com/TheBigCode?tab=repositories" target="_blank">我的仓库</a>
        </div>
    </div>

    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--opacity', Math.random() * 0.8 + 0.2);
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
